<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abalone</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#12161e;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}
#header{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;width:100%;max-width:900px}
h1{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#status{font-size:0.9rem;color:#94a3b8}
#turn-indicator{padding:4px 12px;border-radius:20px;font-size:0.8rem;font-weight:600}
.turn-black{background:#1e293b;color:#e2e8f0;border:1px solid #334155}
.turn-white{background:#f8fafc;color:#1e293b;border:1px solid #e2e8f0}
#canvas-container{position:relative;margin:10px}
canvas{display:block;border-radius:12px;cursor:pointer}
#info-bar{display:flex;gap:20px;padding:8px 16px;background:#1e293b;border-radius:8px;margin-top:8px;font-size:0.8rem;color:#94a3b8}
#info-bar span strong{color:#e2e8f0}
#message{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);padding:8px 20px;background:rgba(0,0,0,0.7);border-radius:20px;font-size:0.85rem;color:#e2e8f0;pointer-events:none;opacity:0;transition:opacity 0.3s}
#message.show{opacity:1}
</style>
</head>
<body>
<div id="header">
  <h1>ABALONE</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span id="status">Your turn (Black)</span>
    <span id="turn-indicator" class="turn-black">BLACK</span>
  </div>
</div>
<div id="canvas-container">
  <canvas id="game"></canvas>
  <div id="message"></div>
</div>
<div id="info-bar">
  <span>Black: <strong id="black-count">14</strong></span>
  <span>White: <strong id="white-count">14</strong></span>
  <span>Black out: <strong id="black-out">0</strong></span>
  <span>White out: <strong id="white-out">0</strong></span>
</div>

<script>
const EMPTY=0, BLACK=1, WHITE=2;
const DIRS=[[1,0],[0,1],[-1,1],[-1,0],[0,-1],[1,-1]];

// Generate hex board radius 4
function genBoard(r=4){
  const cells=new Set();
  for(let q=-r;q<=r;q++)for(let r2=Math.max(-r,-q-r);r2<=Math.min(r,-q+r);r2++)cells.add(q+","+r2);
  return cells;
}

const BOARD_CELLS=genBoard(4);
const CELL_LIST=[...BOARD_CELLS].map(s=>s.split(",").map(Number));

// Center score table
function buildCenterTable(r=4){
  const t={};
  for(let q=-r;q<=r;q++)for(let r2=Math.max(-r,-q-r);r2<=Math.min(r,-q+r);r2++){
    const s=-q-r2,d=Math.max(Math.abs(q),Math.abs(r2),Math.abs(s));
    t[q+","+r2]=d<=1?3:d<=2?2:d<=3?1:0;
  }
  return t;
}
const CENTER_T=buildCenterTable(4);
const BORDER_CELLS=new Set(CELL_LIST.filter(c=>CENTER_T[c[0]+","+c[1]]===0).map(c=>c[0]+","+c[1]));

// Initial positions
const POS_BLACK=[[0,-4],[1,-4],[2,-4],[3,-4],[4,-4],[-1,-3],[0,-3],[1,-3],[2,-3],[3,-3],[-1,-2],[0,-2],[1,-2],[2,-2]];
const POS_WHITE=[[-4,2],[-3,2],[-2,2],[1,2],[2,2],[-4,3],[-3,3],[-2,3],[-1,3],[-4,4],[-3,4],[-2,4],[-1,4],[0,4]];

// Game state
let state={};
let blackOut=0, whiteOut=0;
let currentPlayer=BLACK;
let selected=[]; // array of [q,r] selected cells
let validMoves=[];
let hoverCell=null;
let cellSize=28;
let centerX=400, centerY=320;
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

// Axial to pixel
function toPixel(q,r){
  const x=cellSize*(3/2*q);
  const y=cellSize*(Math.sqrt(3)/2*q+Math.sqrt(3)*r);
  return [centerX+x, centerY+y];
}

// Pixel to axial (approx)
function toAxial(px,py){
  const x=(px-centerX)/cellSize;
  const y=(py-centerY)/cellSize;
  const q=(2/3)*x;
  const r=(-1/3)*x+Math.sqrt(3)/3*y;
  // Round to nearest hex
  let rq=Math.round(q),rr=Math.round(r),rs=Math.round(-q-r);
  const dq=Math.abs(q-rq),dr=Math.abs(r-rr),ds=Math.abs(-q-r-rs);
  if(dq>dr&&dq>ds)rq=-rr-rs;
  else if(dr>ds)rr=-rq-rs;
  return [rq,rr];
}

function initGame(){
  state={};
  for(const c of CELL_LIST)state[c[0]+","+c[1]]=EMPTY;
  for(const c of POS_BLACK)state[c[0]+","+c[1]]=BLACK;
  for(const c of POS_WHITE)state[c[0]+","+c[1]]=WHITE;
  blackOut=0;whiteOut=0;
  currentPlayer=BLACK;
  selected=[];
  validMoves=genAllMoves(BLACK);
  resize();
  render();
  updateUI();
}

function resize(){
  const w=Math.min(800,window.innerWidth-40),h=Math.min(640,window.innerHeight-200);
  canvas.width=w;canvas.height=h;
  centerX=w/2;centerY=h/2;
  cellSize=Math.min(w,h)/22;
}

function genAllMoves(color){
  const moves=[];
  const myCells=CELL_LIST.filter(c=>state[c[0]+","+c[1]]===color);
  const opp=color===BLACK?WHITE:BLACK;

  // Single moves
  for(const c of myCells){
    for(const d of DIRS){
      const dest=[c[0]+d[0],c[1]+d[1]];
      if(state[dest[0]+","+dest[1]]===EMPTY){
        moves.push({sel:[c],dest,type:"move",dir:d});
      }
    }
  }

  // 2-marble inline
  for(let i=0;i<myCells.length;i++){
    for(let j=i+1;j<myCells.length;j++){
      const a=myCells[i],b=myCells[j];
      const dq=b[0]-a[0],dr=b[1]-a[1];
      if(Math.abs(dq)+Math.abs(dr)+Math.abs(-dq-dr)===2&&(dq===0||dr===0||dq===-dr)){
        // Inline pair
        for(const d of DIRS){
          const destA=[a[0]+d[0],a[1]+d[1]],destB=[b[0]+d[0],b[1]+d[1]];
          if(state[destA[0]+","+destA[1]]===EMPTY&&state[destB[0]+","+destB[1]]===EMPTY){
            moves.push({sel:[a,b],dest:destB,type:"parallel",dir:d});
          }
        }
        // Inline push
        const dir=[dq,dr];
        const front=[b[0]+dir[0],b[1]+dir[1]];
        const back=[a[0]-dir[0],a[1]-dir[1]];
        if(state[front[0]+","+front[1]]===EMPTY)
          moves.push({sel:[a,b],dest:front,type:"inline",dir});
        if(state[back[0]+","+back[1]]===EMPTY)
          moves.push({sel:[a,b],dest:back,type:"inline",dir:[-dir[0],-dir[1]]});
        // Sumito push
        if(state[front[0]+","+front[1]]===opp){
          const beyond=[front[0]+dir[0],front[1]+dir[1]];
          if(state[beyond[0]+","+beyond[1]]===EMPTY||!BOARD_CELLS.has(beyond[0]+","+beyond[1]))
            moves.push({sel:[a,b],dest:front,type:"push",dir,pushCount:1});
        }
      }
    }
  }

  // 3-marble inline
  for(let i=0;i<myCells.length;i++){
    for(let j=i+1;j<myCells.length;j++){
      for(let k=j+1;k<myCells.length;k++){
        const a=myCells[i],b=myCells[j],c=myCells[k];
        // Check collinearity
        const d1=[b[0]-a[0],b[1]-a[1]],d2=[c[0]-b[0],c[1]-b[1]];
        if(d1[0]===d2[0]&&d1[1]===d2[1]){
          const dir=d1;
          // Parallel moves
          for(const d of DIRS){
            const da=[a[0]+d[0],a[1]+d[1]],db=[b[0]+d[0],b[1]+d[1]],dc=[c[0]+d[0],c[1]+d[1]];
            if(state[da[0]+","+da[1]]===EMPTY&&state[db[0]+","+db[1]]===EMPTY&&state[dc[0]+","+dc[1]]===EMPTY)
              moves.push({sel:[a,b,c],dest:dc,type:"parallel",dir:d});
          }
          // Inline
          const front=[c[0]+dir[0],c[1]+dir[1]],back=[a[0]-dir[0],a[1]-dir[1]];
          if(state[front[0]+","+front[1]]===EMPTY)
            moves.push({sel:[a,b,c],dest:front,type:"inline",dir});
          if(state[back[0]+","+back[1]]===EMPTY)
            moves.push({sel:[a,b,c],dest:back,type:"inline",dir:[-dir[0],-dir[1]]});
          // Push (can push up to 2)
          if(state[front[0]+","+front[1]]===opp){
            const beyond=[front[0]+dir[0],front[1]+dir[1]];
            if(state[beyond[0]+","+beyond[1]]===EMPTY||!BOARD_CELLS.has(beyond[0]+","+beyond[1]))
              moves.push({sel:[a,b,c],dest:front,type:"push",dir,pushCount:1});
            else if(state[beyond[0]+","+beyond[1]]===opp){
              const b2=[beyond[0]+dir[0],beyond[1]+dir[1]];
              if(state[b2[0]+","+b2[1]]===EMPTY||!BOARD_CELLS.has(b2[0]+","+b2[1]))
                moves.push({sel:[a,b,c],dest:front,type:"push",dir,pushCount:2});
            }
          }
        }
      }
    }
  }
  return moves;
}

function applyMove(move){
  const color=currentPlayer;
  const opp=color===BLACK?WHITE:BLACK;
  const sel=move.sel,dest=move.dest,dir=move.dir;

  if(move.type==="move"){
    state[sel[0][0]+","+sel[0][1]]=EMPTY;
    state[dest[0]+","+dest[1]]=color;
  } else if(move.type==="parallel"){
    for(const s of sel){
      state[s[0]+","+s[1]]=EMPTY;
    }
    for(const s of sel){
      state[s[0]+dir[0]+","+(s[1]+dir[1])]=color;
    }
  } else if(move.type==="inline"){
    // Move all in line
    const sorted=[...sel].sort((a,b)=>(a[0]*dir[0]+a[1]*dir[1])-(b[0]*dir[0]+b[1]*dir[1]));
    if(state[dest[0]+","+dest[1]]===EMPTY){
      // Move front-most to dest, others shift
      const last=sorted[sorted.length-1];
      state[last[0]+","+last[1]]=EMPTY;
      state[dest[0]+","+dest[1]]=color;
    }
  } else if(move.type==="push"){
    const sorted=[...sel].sort((a,b)=>(a[0]*dir[0]+a[1]*dir[1])-(b[0]*dir[0]+b[1]*dir[1]));
    // Push opponent
    let pushTarget=dest;
    if(state[pushTarget[0]+","+pushTarget[1]]===opp){
      const beyond=[pushTarget[0]+dir[0],pushTarget[1]+dir[1]];
      if(!BOARD_CELLS.has(beyond[0]+","+beyond[1])){
        // Eject!
        state[pushTarget[0]+","+pushTarget[1]]=EMPTY;
        if(color===BLACK)whiteOut++;else blackOut++;
      } else {
        state[beyond[0]+","+beyond[1]]=opp;
      }
    }
    // Move our marbles
    const last=sorted[sorted.length-1];
    state[last[0]+","+last[1]]=EMPTY;
    state[dest[0]+","+dest[1]]=color;
  }
}

function checkWin(){
  if(blackOut>=6)return WHITE;
  if(whiteOut>=6)return BLACK;
  return null;
}

// Simple AI
function evaluateBoard(color){
  const opp=color===BLACK?WHITE:BLACK;
  let my=0,oppCount=0,myCenter=0,oppCenter=0,myBorder=0,oppBorder=0;
  for(const c of CELL_LIST){
    const v=state[c[0]+","+c[1]];
    if(v===color){my++;myCenter+=CENTER_T[c[0]+","+c[1]];if(BORDER_CELLS.has(c[0]+","+c[1]))myBorder++;}
    if(v===opp){oppCount++;oppCenter+=CENTER_T[c[0]+","+c[1]];if(BORDER_CELLS.has(c[0]+","+c[1]))oppBorder++;}
  }
  const material=my-oppCount;
  const center=myCenter-oppCenter;
  const border=myBorder-oppBorder;
  const ejectBonus=(color===BLACK?whiteOut-blackOut:blackOut-whiteOut)*200;
  return 100*material+8*center-15*border+ejectBonus;
}

function aiMove(){
  const moves=genAllMoves(currentPlayer);
  if(!moves.length)return;

  let best=null,bestScore=-Infinity;
  for(const m of moves){
    // Simulate
    const saved={...state},bo=blackOut,wo=whiteOut;
    // Quick apply
    const color=currentPlayer;
    const opp=color===BLACK?WHITE:BLACK;
    const sel=m.sel,dest=m.dest,dir=m.dir;
    if(m.type==="move"){state[sel[0][0]+","+sel[0][1]]=EMPTY;state[dest[0]+","+dest[1]]=color;}
    else if(m.type==="parallel"){for(const s of sel)state[s[0]+","+s[1]]=EMPTY;for(const s of sel)state[s[0]+dir[0]+","+(s[1]+dir[1])]=color;}
    else if(m.type==="inline"){
      const sorted=[...sel].sort((a,b)=>(a[0]*dir[0]+a[1]*dir[1])-(b[0]*dir[0]+b[1]*dir[1]));
      const last=sorted[sorted.length-1];
      state[last[0]+","+last[1]]=EMPTY;state[dest[0]+","+dest[1]]=color;
    } else if(m.type==="push"){
      const sorted=[...sel].sort((a,b)=>(a[0]*dir[0]+a[1]*dir[1])-(b[0]*dir[0]+b[1]*dir[1]));
      if(state[dest[0]+","+dest[1]]===opp){
        const beyond=[dest[0]+dir[0],dest[1]+dir[1]];
        if(!BOARD_CELLS.has(beyond)){state[dest[0]+","+dest[1]]=EMPTY;if(color===BLACK)whiteOut++;else blackOut++;}
        else{state[beyond[0]+","+beyond[1]]=opp;}
      }
      const last=sorted[sorted.length-1];
      state[last[0]+","+last[1]]=EMPTY;state[dest[0]+","+dest[1]]=color;
    }

    const score=evaluateBoard(currentPlayer);
    state=saved;blackOut=bo;whiteOut=wo;

    // Bonus for push moves
    const finalScore=m.type==="push"?score+150:score;
    if(finalScore>bestScore){bestScore=finalScore;best=m;}
  }
  return best;
}

// Rendering
function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#12161e";ctx.fillRect(0,0,canvas.width,canvas.height);

  // Draw cells
  for(const c of CELL_LIST){
    const [px,py]=toPixel(c[0],c[1]);
    const v=state[c[0]+","+c[1]];
    const isHover=hoverCell&&hoverCell[0]===c[0]&&hoverCell[1]===c[1];
    const isSelected=selected.some(s=>s[0]===c[0]&&s[1]===c[1]);

    // Cell background
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const angle=Math.PI/3*i-Math.PI/6;
      const cx2=px+cellSize*0.9*Math.cos(angle);
      const cy2=py+cellSize*0.9*Math.sin(angle);
      if(i===0)ctx.moveTo(cx2,cy2);else ctx.lineTo(cx2,cy2);
    }
    ctx.closePath();
    if(isSelected){ctx.fillStyle="#3b82f6";ctx.fill();}
    else if(isHover){ctx.fillStyle="#334155";ctx.fill();}
    else{ctx.fillStyle="#1e293b";ctx.fill();}
    ctx.strokeStyle="#334155";ctx.lineWidth=1;ctx.stroke();

    // Marble
    if(v!==EMPTY){
      ctx.beginPath();
      ctx.arc(px,py,cellSize*0.7,0,Math.PI*2);
      if(v===BLACK){
        const g=ctx.createRadialGradient(px-cellSize*0.2,py-cellSize*0.2,0,px,py,cellSize*0.7);
        g.addColorStop(0,"#555");g.addColorStop(1,"#111");
        ctx.fillStyle=g;
      } else {
        const g=ctx.createRadialGradient(px-cellSize*0.2,py-cellSize*0.2,0,px,py,cellSize*0.7);
        g.addColorStop(0,"#fff");g.addColorStop(1,"#ccc");
        ctx.fillStyle=g;
      }
      ctx.fill();
      ctx.strokeStyle=v===BLACK?"#666":"#aaa";ctx.lineWidth=1.5;ctx.stroke();
    }
  }

  // Highlight valid destinations for selected marbles
  if(selected.length>0){
    for(const m of validMoves){
      if(m.sel.length===selected.length&&m.sel.every((s,i)=>s[0]===selected[i][0]&&s[1]===selected[i][1])){
        const [px,py]=toPixel(m.dest[0],m.dest[1]);
        ctx.beginPath();
        ctx.arc(px,py,cellSize*0.3,0,Math.PI*2);
        ctx.fillStyle=m.type==="push"?"rgba(239,68,68,0.6)":"rgba(34,197,94,0.5)";
        ctx.fill();
      }
    }
  }
}

function updateUI(){
  const blackCount=CELL_LIST.filter(c=>state[c[0]+","+c[1]]===BLACK).length;
  const whiteCount=CELL_LIST.filter(c=>state[c[0]+","+c[1]]===WHITE).length;
  document.getElementById("black-count").textContent=blackCount;
  document.getElementById("white-count").textContent=whiteCount;
  document.getElementById("black-out").textContent=blackOut;
  document.getElementById("white-out").textContent=whiteOut;

  const ind=document.getElementById("turn-indicator");
  if(currentPlayer===BLACK){
    ind.textContent="BLACK (You)";
    ind.className="turn-black";
    document.getElementById("status").textContent=selected.length>0?`Selected ${selected.length} marble(s) - click destination`:"Your turn - click a marble to select";
  } else {
    ind.textContent="WHITE (AI)";
    ind.className="turn-white";
    document.getElementById("status").textContent="AI is thinking...";
  }
}

function showMessage(msg){
  const el=document.getElementById("message");
  el.textContent=msg;el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),2000);
}

// Input
canvas.addEventListener("click",e=>{
  if(currentPlayer!==BLACK)return;
  const rect=canvas.getBoundingClientRect();
  const [q,r]=toAxial(e.clientX-rect.left,e.clientY-rect.top);
  const key=q+","+r;
  if(!BOARD_CELLS.has(key))return;

  const v=state[key];

  // If clicking on own marble, select/deselect
  if(v===BLACK){
    const idx=selected.findIndex(s=>s[0]===q&&s[1]===r);
    if(idx>=0){selected.splice(idx,1);}
    else if(selected.length<3){
      // Check if adding maintains line
      if(selected.length===0){selected.push([q,r]);}
      else if(selected.length===1){
        const dq=q-selected[0][0],dr=r-selected[0][1];
        if(DIRS.some(d=>d[0]===dq&&d[1]===dr))selected.push([q,r]);
        else{selected=[[q,r]];}
      } else {
        // Check collinearity with first two
        const d1=[selected[1][0]-selected[0][0],selected[1][1]-selected[0][1]];
        const d2=[q-selected[1][0],r-selected[1][1]];
        if(d1[0]===d2[0]&&d1[1]===d2[1])selected.push([q,r]);
        else{selected=[[q,r]];}
      }
    }
    render();updateUI();return;
  }

  // If clicking on empty or opponent, try to move
  if(selected.length>0&&(v===EMPTY||v===WHITE)){
    const move=validMoves.find(m=>
      m.sel.length===selected.length&&
      m.sel.every((s,i)=>s[0]===selected[i][0]&&s[1]===selected[i][1])&&
      m.dest[0]===q&&m.dest[1]===r
    );
    if(move){
      applyMove(move);
      selected=[];
      const winner=checkWin();
      if(winner!==null){
        showMessage(winner===BLACK?"You Win! 🎉":"AI Wins! 🤖");
        render();
        setTimeout(()=>{if(confirm("Play again?"))initGame();},500);
        return;
      }
      currentPlayer=WHITE;
      render();updateUI();
      // AI turn
      setTimeout(()=>{
        const aiM=aiMove();
        if(aiM){applyMove(aiM);}
        const w2=checkWin();
        if(w2!==null){
          showMessage(w2===BLACK?"You Win! 🎉":"AI Wins! 🤖");
          render();
          setTimeout(()=>{if(confirm("Play again?"))initGame();},500);
          return;
        }
        currentPlayer=BLACK;
        validMoves=genAllMoves(BLACK);
        render();updateUI();
      },600);
    }
  }
});

canvas.addEventListener("mousemove",e=>{
  const rect=canvas.getBoundingClientRect();
  hoverCell=toAxial(e.clientX-rect.left,e.clientY-rect.top);
  render();
});

canvas.addEventListener("mouseleave",()=>{hoverCell=null;render();});
window.addEventListener("resize",()=>{resize();render();});

initGame();
</script>
</body>
</html>
